<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>% от рабочего дня</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 32px;
      text-align: center;
    }

    .field {
      width: 100%;
      max-width: 360px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--tg-theme-hint-color, #999);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 500;
      border: 2px solid var(--tg-theme-hint-color, #ddd);
      border-radius: 12px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--tg-theme-button-color, #3390ec);
    }

    .result-card {
      width: 100%;
      max-width: 360px;
      margin-top: 12px;
      padding: 28px 20px;
      border-radius: 16px;
      background: var(--tg-theme-button-color, #3390ec);
      text-align: center;
      transition: transform 0.2s;
    }

    .result-number {
      font-size: 56px;
      font-weight: 800;
      color: var(--tg-theme-button-text-color, #fff);
      line-height: 1;
    }

    .result-label {
      font-size: 15px;
      color: var(--tg-theme-button-text-color, #fff);
      opacity: 0.8;
      margin-top: 8px;
    }

    .bar-container {
      width: 100%;
      max-width: 360px;
      margin-top: 20px;
      height: 8px;
      border-radius: 4px;
      background: var(--tg-theme-secondary-bg-color, #e0e0e0);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--tg-theme-button-color, #3390ec);
      transition: width 0.3s ease;
      width: 0%;
    }

    .hint {
      width: 100%;
      max-width: 360px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>⏱ Процент дня</h1>
  <p class="subtitle">Сколько минут — это сколько процентов?</p>

  <div class="field">
    <label>Рабочий день (часы)</label>
    <input type="number" id="hours" value="8" min="0.5" max="24" step="0.5" inputmode="decimal">
  </div>

  <div class="field">
    <label>Минуты</label>
    <input type="number" id="minutes" value="" min="0" step="1" inputmode="numeric" placeholder="Введите минуты">
  </div>

  <div class="result-card">
    <div class="result-number" id="percent">0%</div>
    <div class="result-label">от рабочего дня</div>
  </div>

  <div class="bar-container">
    <div class="bar-fill" id="bar"></div>
  </div>

  <p class="hint" id="hint"></p>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const hoursInput = document.getElementById('hours');
    const minutesInput = document.getElementById('minutes');
    const percentEl = document.getElementById('percent');
    const barEl = document.getElementById('bar');
    const hintEl = document.getElementById('hint');

    function calculate() {
      const totalHours = parseFloat(hoursInput.value) || 8;
      const totalMinutes = totalHours * 60;
      const mins = parseFloat(minutesInput.value) || 0;

      if (mins <= 0 || totalMinutes <= 0) {
        percentEl.textContent = '0%';
        barEl.style.width = '0%';
        hintEl.textContent = '';
        return;
      }

      const pct = (mins / totalMinutes) * 100;
      const display = pct < 1 ? pct.toFixed(2) : pct < 10 ? pct.toFixed(1) : Math.round(pct);

      percentEl.textContent = display + '%';
      barEl.style.width = Math.min(pct, 100) + '%';

      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      const timeStr = h > 0 ? `${h} ч ${m} мин` : `${m} мин`;
      hintEl.textContent = `${timeStr} из ${totalHours} ч`;
    }

    hoursInput.addEventListener('input', calculate);
    minutesInput.addEventListener('input', calculate);

    // Фокус на поле минут при открытии
    setTimeout(() => minutesInput.focus(), 300);
  </script>
</body>
</html>
